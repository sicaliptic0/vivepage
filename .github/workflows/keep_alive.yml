name: Database Vitality Protocol

on:
  schedule:
    # This runs the protocol every Monday and Thursday at midnight UTC
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # This allows you to trigger the pulse manually

jobs:
  maintain_connectivity:
    runs-on: ubuntu-latest
    steps:
      - name: Execute System Ping
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
