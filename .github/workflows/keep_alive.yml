name: Database Vitality Protocol V3

on:
  schedule:
    - cron: '0 0 * * *' # Frecuencia diaria
  workflow_dispatch:

jobs:
  maintain_connectivity:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Write Transaction
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/health_check" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
          -H "Content-Type: application/json" \
          -H "Prefer: resolution=merge-duplicates" \
          -d '{ "id": 1 }'
