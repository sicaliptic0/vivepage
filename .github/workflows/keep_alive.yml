name: Database Vitality Protocol V2

on:
  schedule:
    # Optimized frequency: Daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  maintain_connectivity:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deep Database Query
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/health_check?select=*" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
